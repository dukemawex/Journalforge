# .do/app.yaml
spec:
  name: journalforge
  region: nyc
  services:
    - name: journalforge
      dockerfile_path: apps/api/Dockerfile
      source_dir: /
      http_port: 8080
      instance_size_slug: basic-xs
      instance_count: 1
      run_command: sh -c "MAX_RETRIES=10; i=0; until npx prisma migrate deploy --schema=./prisma/schema.prisma; do i=$((i+1)); echo \"Migration failed (attempt $i/$MAX_RETRIES), retrying in 5s...\"; [ $i -ge $MAX_RETRIES ] && echo 'Max retries reached, exiting.' && exit 1; sleep 5; done && node dist/index.js"
      envs:
        - key: DATABASE_URL
          scope: RUN_TIME
          type: SECRET
        - key: REDIS_URL
          scope: RUN_TIME
          value: ${journalforge-cache.REDIS_URL}
        - key: OPENROUTER_API_KEY
          scope: RUN_TIME
          type: SECRET
        - key: FRONTEND_URL
          scope: RUN_TIME
          type: SECRET
        - key: PORT
          scope: RUN_TIME
          value: "8080"
        - key: NODE_ENV
          scope: RUN_TIME
          value: production
        - key: STORAGE_PATH
          scope: RUN_TIME
          value: /tmp/journalforge
        - key: DO_SPACES_KEY
          scope: RUN_TIME
          type: SECRET
        - key: DO_SPACES_SECRET
          scope: RUN_TIME
          type: SECRET
        - key: DO_SPACES_BUCKET
          scope: RUN_TIME
          value: journalforge-files
        - key: DO_SPACES_REGION
          scope: RUN_TIME
          value: nyc3
        - key: DO_SPACES_ENDPOINT
          scope: RUN_TIME
          value: https://nyc3.digitaloceanspaces.com
        - key: API_SECRET
          scope: RUN_TIME
          type: SECRET
      health_check:
        http_path: /health

  databases:
    - name: journalforge-cache
      engine: REDIS
      version: "7"
      size: db-s-dev-database
      num_nodes: 1
