# .do/app.yaml
spec:
  name: journalforge
  region: nyc
  services:
    - name: journalforge-api
      source_dir: apps/api
      dockerfile_path: Dockerfile
      http_port: 8080
      instance_size_slug: basic-xs
      instance_count: 1
      run_command: sh -c "until npx prisma migrate deploy; do echo 'Retrying migration in 5s...'; sleep 5; done && node dist/index.js"
      envs:
        - key: DATABASE_URL
          scope: RUN_TIME
          value: ${journalforge-db.DATABASE_URL}
        - key: REDIS_URL
          scope: RUN_TIME
          value: ${journalforge-cache.REDIS_URL}
        - key: OPENROUTER_API_KEY
          scope: RUN_TIME
          type: SECRET
        - key: FRONTEND_URL
          scope: RUN_TIME
          type: SECRET
        - key: PORT
          scope: RUN_TIME
          value: "8080"
        - key: NODE_ENV
          scope: RUN_TIME
          value: production
        - key: STORAGE_PATH
          scope: RUN_TIME
          value: /tmp/journalforge
        - key: API_SECRET
          scope: RUN_TIME
          type: SECRET
      health_check:
        http_path: /health

  databases:
    - name: journalforge-db
      engine: PG
      version: "16"
      size: db-s-dev-database
      num_nodes: 1

    - name: journalforge-cache
      engine: REDIS
      version: "7"
      size: db-s-dev-database
      num_nodes: 1
